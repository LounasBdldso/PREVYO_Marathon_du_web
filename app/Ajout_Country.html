<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prevyo — Enrichissement Country</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06101f;--surface: rgba(11, 26, 48, 0.92);--surface-2: rgba(17, 34, 64, 0.92);--surface-3: rgba(22, 45, 78, 0.95);
      --text: #dde8f5;--text-2: #6b84a3;
      --accent: #1bae9f;--accent-2:#09a4e8;--accent-dim: rgba(27,174,159,0.12);
      --ok: #2ed573;--ok-dim: rgba(46,213,115,0.12);
      --warn: #ffa502;--warn-dim: rgba(255,165,2,0.12);
      --danger: #ff4757;--danger-dim: rgba(255,71,87,0.10);
      --purple: #bd33d1;--purple-dim: rgba(189,51,209,0.12);
      --border: rgba(27,174,159,0.15);--border-2: rgba(107,132,163,0.24);--radius: 14px;--radius-lg:22px;
      --mono: 'JetBrains Mono', monospace;--sans: 'Lexend', system-ui, sans-serif;--shadow:0 24px 50px rgba(0,0,0,.22);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0}html{height:100%}
    body{height:100%;font-family:var(--sans);background:radial-gradient(circle at top left, rgba(27,174,159,.08), transparent 28%),radial-gradient(circle at top right, rgba(9,164,232,.08), transparent 30%),linear-gradient(180deg, rgba(7,14,28,1), rgba(6,16,31,1));color:var(--text);line-height:1.5;overflow:hidden}
    .app{display:grid;grid-template-rows:auto 1fr;height:100vh}
    .topbar{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:linear-gradient(180deg, rgba(11, 26, 48, 0.92), rgba(8, 20, 38, 0.88));border-bottom:1px solid var(--border);backdrop-filter:blur(14px)}
    .topbar-meta{display:flex;flex-direction:column;gap:.2rem}
    .topbar-kicker{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
    .topbar h1{font-size:1rem;font-weight:700;letter-spacing:-.02em;color:#f7fbff}
    .topbar h1 span{background:linear-gradient(135deg, var(--accent), var(--accent-2), var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .topbar-sub{color:var(--text-2);font-size:.8rem}
    .topbar-stats{display:flex;gap:.75rem;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
    .topbar-stat{display:flex;align-items:center;gap:.55rem;padding:.55rem .8rem;border-radius:999px;background:rgba(17,34,64,.72);border:1px solid rgba(107,132,163,.12);font-size:.78rem;color:var(--text)}
    .topbar-stat .dot{width:8px;height:8px;border-radius:50%}
    .workspace{display:grid;grid-template-columns:380px 1fr;min-height:0;padding:1rem 1.25rem 1rem;gap:1rem}
    .panel-left,.panel-right{min-height:0;overflow:hidden;background:linear-gradient(180deg, rgba(11, 26, 48, 0.92), rgba(8, 20, 38, 0.92));border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);backdrop-filter:blur(14px)}
    .panel-left{display:flex;flex-direction:column}
    .panel-header{padding:1rem 1rem .9rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
    .panel-header-copy{display:grid;gap:.2rem}
    .panel-header h2{font-size:.92rem;font-weight:700;color:#f7fbff}
    .panel-header p{font-size:.76rem;color:var(--text-2);line-height:1.5}
    .panel-header .count{margin-left:auto;padding:.2rem .7rem;border-radius:999px;font-size:.75rem;font-weight:700}
    .count-p{background:var(--purple-dim);color:var(--purple)}
    .panel-toolbar{padding:.85rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
    .panel-toolbar input{width:100%;padding:.8rem .9rem;border-radius:12px;border:1px solid rgba(107,132,163,.18);background:rgba(6,16,31,.9);color:var(--text);font-family:var(--sans);font-size:.84rem;outline:none;transition:border-color .2s ease, box-shadow .2s ease}
    .panel-toolbar input:focus,.srow input:focus,.srow select:focus,.mfield input:focus{border-color:rgba(27,174,159,.5);box-shadow:0 0 0 3px rgba(27,174,159,.12)}
    .panel-toolbar input::placeholder{color:var(--text-2)}
    .panel-toolbar-note{margin-top:.55rem;font-size:.74rem;color:var(--text-2)}
    .anomaly-list{flex:1;overflow-y:auto;padding:.65rem}
    .acard{padding:.9rem;border-radius:16px;cursor:pointer;transition:background .18s,border-color .18s,transform .18s;border:1px solid transparent;margin-bottom:.35rem;background:rgba(17,34,64,.3)}
    .acard:hover{background:rgba(17,34,64,.88);border-color:rgba(107,132,163,.16);transform:translateY(-1px)}.acard.active{background:var(--accent-dim);border-color:rgba(27,174,159,.4);box-shadow:0 0 0 1px rgba(27,174,159,.12)}
    .acard.fixed{opacity:.5}.acard.fixed .af::after{content:' \2713';color:var(--ok);font-size:.78rem;font-weight:600}
    .at{font-size:.68rem;font-weight:700;padding:.22rem .6rem;border-radius:999px;text-transform:uppercase;letter-spacing:.06em;display:inline-block;margin-bottom:.45rem}
    .at-p{background:var(--purple-dim);color:var(--purple)}
    .af{font-weight:700;font-size:.92rem;color:#f7fbff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .am{font-size:.76rem;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.2rem}
    .panel-right{display:flex;flex-direction:column;min-height:0;overflow-y:auto}
    .detail-empty{display:flex;align-items:center;justify-content:center;height:100%;padding:1.4rem;text-align:center;color:var(--text-2);font-size:.95rem}
    .empty-card{width:min(100%,520px);padding:1.2rem;border-radius:20px;background:linear-gradient(180deg, rgba(11, 26, 48, 0.92), rgba(8, 20, 38, 0.94));border:1px solid rgba(27,174,159,.14);box-shadow:0 16px 30px rgba(0,0,0,.16);display:grid;gap:.7rem}
    .empty-icon{width:52px;height:52px;margin:0 auto;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;background:rgba(27,174,159,.12);color:var(--accent);font-size:1.35rem;font-weight:700}
    .empty-title{font-size:1.02rem;font-weight:700;color:#f7fbff}
    .empty-copy{color:var(--text-2);font-size:.84rem;line-height:1.7}
    .detail-view{padding:1.4rem;max-width:900px;width:100%}
    .detail-view h2{font-size:1.35rem;font-weight:700;margin-bottom:.25rem;color:#f7fbff}
    .dhero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:1rem;padding:1rem;margin-bottom:1rem;border-radius:18px;background:linear-gradient(180deg, rgba(11, 26, 48, 0.92), rgba(8, 20, 38, 0.94));border:1px solid rgba(27,174,159,.14)}
    .dhero p{color:var(--text-2);font-size:.84rem;line-height:1.65}
    .dbadges{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.65rem}
    .dbadge{display:inline-flex;align-items:center;padding:.4rem .7rem;border-radius:999px;border:1px solid rgba(107,132,163,.16);background:rgba(6,16,31,.54);color:var(--text);font-size:.73rem;font-weight:700}
    .dbadge.place{color:var(--purple);border-color:rgba(189,51,209,.22);background:rgba(189,51,209,.08)}
    .dkpis{display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:.7rem;min-width:260px}
    .dkpi{padding:.85rem .9rem;border-radius:16px;background:rgba(6,16,31,.72);border:1px solid rgba(107,132,163,.14)}
    .dkpi strong{display:block;color:#f7fbff;font-size:1rem;margin-bottom:.15rem}
    .dkpi span{color:var(--text-2);font-size:.74rem;line-height:1.45}
    .dsec{background:rgba(17,34,64,.5);border:1px solid rgba(107,132,163,.14);border-radius:20px;padding:1.1rem;margin-bottom:1rem}
    .dsec h3{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-2);margin-bottom:.85rem}
    .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
    .dfield label,.mfield label{display:block;font-size:.72rem;color:var(--text-2);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
    .dval{font-family:var(--mono);font-size:.8rem;padding:.78rem .85rem;border-radius:12px;background:rgba(6,16,31,.88);border:1px solid rgba(107,132,163,.16);word-break:break-word;color:var(--text)}
    .ctx{font-size:.84rem;line-height:1.75;padding:.95rem 1rem;border-radius:14px;background:rgba(6,16,31,.84);border:1px solid rgba(107,132,163,.14);color:var(--text-2)}
    .srow{display:flex;gap:.6rem;margin-bottom:.9rem;flex-wrap:wrap}
    .srow input,.srow select{padding:.8rem .9rem;border-radius:12px;border:1px solid rgba(107,132,163,.18);background:rgba(6,16,31,.9);color:var(--text);font-family:var(--sans);font-size:.84rem}
    .srow input{flex:1}.srow select{min-width:160px}
    .btn{padding:.82rem 1rem;border-radius:12px;border:1px solid transparent;font-family:var(--sans);font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease}
    .btn:hover{transform:translateY(-1px)}
    .btn-a{background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#fff;box-shadow:0 16px 32px rgba(9,164,232,.18)}
    .btn-ok{background:rgba(46,213,115,.16);color:var(--ok);border-color:rgba(46,213,115,.22)}
    .btn-g{background:rgba(6,16,31,.68);border-color:rgba(107,132,163,.16);color:var(--text-2)}.btn-g:hover{border-color:rgba(27,174,159,.25);color:var(--text)}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .slist{display:grid;gap:.55rem;max-height:340px;overflow-y:auto}
    .sitem{display:grid;grid-template-columns:1fr auto;align-items:center;gap:.85rem;padding:.9rem;border-radius:16px;border:1px solid rgba(107,132,163,.14);background:rgba(17,34,64,.55);cursor:pointer}
    .sitem:hover{border-color:rgba(27,174,159,.32);background:rgba(27,174,159,.1)}
    .sn{font-weight:700;font-size:.88rem;color:#f7fbff}.sd{font-size:.74rem;color:var(--text-2);margin-top:.2rem}
    .sc{font-family:var(--mono);font-size:.78rem;color:var(--ok);text-align:right}
    .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1rem}.mgrid.full{grid-template-columns:1fr}
    .mfield input{width:100%;padding:.8rem .9rem;border-radius:12px;border:1px solid rgba(107,132,163,.18);background:rgba(6,16,31,.9);color:var(--text);font-family:var(--sans);font-size:.84rem;outline:none}
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:.9rem 1.25rem 1rem;background:linear-gradient(180deg, rgba(11, 26, 48, 0.92), rgba(8, 20, 38, 0.94));border-top:1px solid var(--border);display:flex;align-items:center;gap:.85rem;z-index:50;backdrop-filter:blur(14px)}
    .bottom-bar .info{font-size:.84rem;color:var(--text-2)}.bottom-bar .spacer{flex:1}
    .load-overlay{position:fixed;inset:0;background:radial-gradient(circle at top left, rgba(27,174,159,.08), transparent 28%),radial-gradient(circle at top right, rgba(9,164,232,.08), transparent 30%),rgba(6,16,31,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:100;padding:1.5rem;text-align:center}
    .load-overlay.hidden{display:none}.load-overlay h2{font-size:1.4rem;color:#f7fbff}.load-overlay .sub{color:var(--text-2);font-size:.9rem;text-align:center;line-height:1.8;max-width:700px}
    .spinner{width:18px;height:18px;border:2px solid rgba(107,132,163,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:999px}
    .applied-banner{padding:.9rem 1rem;border-radius:14px;font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
    .applied-banner.ok{background:var(--ok-dim);border:1px solid rgba(46,213,115,.2);color:var(--ok)}
    @media (max-width:1100px){.workspace{grid-template-columns:320px 1fr}}
    @media (max-width:860px){body{overflow:auto}.app{height:auto;min-height:100vh}.topbar{align-items:flex-start;flex-direction:column}.topbar-stats{margin-left:0;justify-content:flex-start}.workspace{grid-template-columns:1fr}.panel-left{min-height:320px}.dhero{grid-template-columns:1fr}.dkpis,.dgrid,.mgrid{grid-template-columns:1fr}.bottom-bar{flex-wrap:wrap}.bottom-bar .spacer{display:none}}
</style>
</head>
<body>

  <div class="app">
    <div class="topbar">
      <h1>Prevyo — <span>Enrichissement Country</span></h1>
      <div class="topbar-stats">
        <div class="topbar-stat"><span class="dot" style="background:var(--warn)"></span><span id="statTotal">0 places</span></div>
        <div class="topbar-stat"><span class="dot" style="background:var(--purple)"></span><span id="statEnriched">0 enrichis</span></div>
      </div>
    </div>
    <div class="workspace">
      <div class="panel-left">
        <div class="panel-header">
          <h2 id="listTitle">Places sans Country</h2>
          <span class="count count-p" id="listCount">0</span>
        </div>
        <div class="panel-toolbar"><input id="filterInput" type="text" placeholder="Filtrer par nom..." /></div>
        <div class="anomaly-list" id="anomalyList"><div class="detail-empty">Charge un fichier.</div></div>
      </div>
      <div class="panel-right" id="panelRight">
        <div class="detail-empty" id="emptyState">&larr; S&eacute;lectionne un lieu.</div>
        <div class="detail-view" id="detailView" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="info" id="bottomInfo">Aucun fichier.</div>
    <div class="spacer"></div>
    <button class="btn btn-g" id="reloadBtn">Recharger un fichier</button>
    <button class="btn btn-a" id="exportBtn" disabled>Exporter le JSON enrichi</button>
  </div>
  <div class="load-overlay" id="loadOverlay">
    <h2>Enrichisseur de Pays Prevyo</h2>
    <div class="sub">Charge ton <strong>export.events.json</strong></div>
    <button class="btn btn-a" id="loadFileBtn" style="width:320px">Charger un fichier</button>
    <button class="btn btn-g" id="loadAutoBtn" style="width:320px">data/export.events.json</button>
    <input type="file" id="fileInput" accept=".json" hidden />
  </div>

  <script src="../js/shared_dataset.js"></script>
  <script>
    // ═══════════ STATE ═══════════
    var rawJson=null, activeIdx=-1;
    var enrichItems=[], enrichData=new Map(); // nodeKey -> {countryNode, placeNodeId}
    var _autoResults=[];
    var $=function(id){return document.getElementById(id)};

    // ═══════════ PARSE ═══════════
    function nm(v){if(Array.isArray(v))return v.map(nm);if(v&&typeof v==='object'){var k=Object.keys(v);if(k.length===1&&k[0]==='$oid')return v.$oid;if(k.length===1&&k[0]==='$date')return v.$date;var o={};for(var i of k)o[i]=nm(v[i]);return o}return v}
    function parse(t){t=t.trim();if(!t)throw new Error('Vide');if(t.startsWith('['))return nm(JSON.parse(t));return t.split(/\n+/).map(function(l){return l.trim()}).filter(Boolean).map(function(l){return nm(JSON.parse(l))})}
    function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

    function buildEmptyCardHtml(icon,title,copy){
      return '<div class="empty-card"><div class="empty-icon">'+icon+'</div><div class="empty-title">'+title+'</div><div class="empty-copy">'+copy+'</div></div>';
    }

    function initializeLayoutCopy(){
      var topbar=document.querySelector('.topbar');
      if(topbar){
        topbar.innerHTML=''
          +'<div class="topbar-meta">'
          +'<div class="topbar-kicker">Module qualite PREVYO</div>'
          +'<h1><span>Enrichissement Country</span> des lieux detectes</h1>'
          +'<div class="topbar-sub">Ajoute un pays fiable aux lieux qui n\'en ont pas encore dans le graphe.</div>'
          +'</div>'
          +'<div class="topbar-stats">'
          +'<div class="topbar-stat"><span class="dot" style="background:var(--warn)"></span><span id="statTotal">0 places</span></div>'
          +'<div class="topbar-stat"><span class="dot" style="background:var(--purple)"></span><span id="statEnriched">0 enrichis</span></div>'
          +'</div>';
      }

      var ph=document.querySelector('.panel-header');
      if(ph){
        ph.innerHTML=''
          +'<div class="panel-header-copy">'
          +'<h2 id="listTitle">Places sans Country</h2>'
          +'<p>Selectionne un lieu, trouve le bon pays puis exporte.</p>'
          +'</div>'
          +'<span class="count count-p" id="listCount">0</span>';
      }

      var pt=document.querySelector('.panel-toolbar');
      if(pt){
        pt.innerHTML=''
          +'<input id="filterInput" type="text" placeholder="Rechercher un lieu ou une description..." />'
          +'<div class="panel-toolbar-note">Filtre la liste avant d\'ouvrir un cas.</div>';
      }

      var list=$('anomalyList');
      if(list && (!rawJson || !rawJson.length)) list.innerHTML='<div class="detail-empty">'+buildEmptyCardHtml('01','Charge un export pour commencer','Les lieux a enrichir apparaitront ici.')+'</div>';

      var emptyState=$('emptyState');
      if(emptyState) emptyState.outerHTML='<div class="detail-empty" id="emptyState">'+buildEmptyCardHtml('02','Selectionne un lieu','Le detail affichera ici le contexte, la recherche de pays et la saisie manuelle.')+'</div>';

      if($('bottomInfo')) $('bottomInfo').textContent='Aucun fichier charge.';
      if($('reloadBtn')) $('reloadBtn').textContent='Revenir au chargement';

      var overlay=$('loadOverlay');
      if(overlay){
        overlay.innerHTML=''
          +'<h2>Enrichissement des pays</h2>'
          +'<div class="sub"></div>'
          +'<button class="btn btn-a" id="loadFileBtn" style="width:320px">Charger un fichier</button>'
          +'<input type="file" id="fileInput" accept=".json" hidden />';
      }
    }

    // ═══════════ DETECT ═══════════
    function detectEnrichItems(data){
      var r=[],seen=new Set();
      for(var ev of data){
        var aid=ev.resultAnalyseId||'SANS_ID',ctx=ev.context||'';
        for(var n of(ev.nodes||[])){
          var labels=n.labels||[];
          var isPlace=labels.some(function(l){return l.includes('Location/Place')});
          var isCountry=labels.some(function(l){return l.includes('Location/Country')});
          if(!isPlace||isCountry)continue;
          var nid=String(n._id||''),nk=nid+'||'+(n.form||'');
          if(seen.has(nk))continue;seen.add(nk);
          var hasCountryInEvent=false;
          for(var n2 of(ev.nodes||[])){
            if((n2.labels||[]).some(function(l){return l.includes('Location/Country')})){
              for(var e of(ev.edges||[])){
                if((String(e.source)===nid&&String(e.target)===String(n2._id))||(String(e.target)===nid&&String(e.source)===String(n2._id))){
                  hasCountryInEvent=true;break;
                }
              }
            }
            if(hasCountryInEvent)break;
          }
          var props=n.properties||{};
          r.push({nodeKey:nk,nodeId:nid,form:n.form||'',labels:labels,properties:{...props},uri:props.uri||null,description:props.description||null,latitude:props.latitude||null,longitude:props.longitude||null,articleId:aid,context:ctx,sourceNodeId:ev.sourceNodeId||null,hasCountryInEvent:hasCountryInEvent});
        }
      }
      return r;
    }

    // ═══════════ RENDER LIST ═══════════
    function renderList(){
      var list=$('anomalyList'),f=($('filterInput').value||'').toLowerCase();
      var fl=enrichItems.filter(function(a){return a.form.toLowerCase().includes(f)||(a.description||'').toLowerCase().includes(f)});
      $('listCount').textContent=fl.length;
      if(!fl.length){list.innerHTML='<div class="detail-empty">'+buildEmptyCardHtml('00','Aucun resultat','Aucune place ne correspond au filtre courant.')+'</div>';return}
      var h='';
      for(var i=0;i<fl.length;i++){
        var a=fl[i],ri=enrichItems.indexOf(a);
        var isEnriched=enrichData.has(a.nodeKey);
        var typeLabel=a.hasCountryInEvent?'D\u00e9j\u00e0 li\u00e9':'Sans Country';
        h+='<div class="acard '+(ri===activeIdx?'active':'')+' '+(isEnriched?'fixed':'')+'" onclick="selectItem('+ri+')">'
          +'<div class="at at-p">'+typeLabel+'</div>'
          +'<div class="af">'+esc(a.form)+'</div>'
          +'<div class="am">'+esc(a.description||a.uri||a.articleId)+'</div></div>';
      }
      list.innerHTML=h;
    }

    function updateStats(){
      $('statTotal').textContent=enrichItems.length+' places';
      $('statEnriched').textContent=enrichData.size+' enrichis';
      $('exportBtn').disabled=(enrichData.size===0);
    }

    function selectItem(idx){activeIdx=idx;renderList();renderEnrichDetail(enrichItems[idx])}

    // ═══════════ ENRICH DETAIL ═══════════
    function renderEnrichDetail(a){
      $('emptyState').style.display='none';var v=$('detailView');v.style.display='block';
      var isEnriched=enrichData.has(a.nodeKey),ed=enrichData.get(a.nodeKey);
      var h='';
      if(isEnriched)h+='<div class="applied-banner ok">\u2713 Country ajout\u00e9 : '+esc(ed.countryNode.form)+'<button class="btn btn-g" style="margin-left:auto;padding:6px 14px;font-size:.82rem" onclick="enrichData.delete(enrichItems[activeIdx].nodeKey);renderEnrichDetail(enrichItems[activeIdx]);renderList();updateStats()">Retirer</button></div>';
      h+='<div class="dhero"><div><div class="dbadges"><span class="dbadge place">Place</span><span class="dbadge">Article '+esc(a.articleId)+'</span></div><h2>'+esc(a.form)+'</h2><p>Ce lieu apparait sans country relie. Tu peux rechercher le bon pays automatiquement ou l\'ajouter manuellement.</p></div><div class="dkpis"><div class="dkpi"><strong>'+(a.latitude||'N/A')+'</strong><span>Latitude</span></div><div class="dkpi"><strong>'+(a.longitude||'N/A')+'</strong><span>Longitude</span></div><div class="dkpi"><strong>'+esc(a.nodeId)+'</strong><span>ID du noeud</span></div><div class="dkpi"><strong>'+(a.labels||[]).length+'</strong><span>Label(s)</span></div></div></div>';
      h+='<div class="dsec"><h3>Noeud actuel</h3><div class="dgrid">'
        +'<div class="dfield"><label>_id</label><div class="dval">'+esc(a.nodeId)+'</div></div>'
        +'<div class="dfield"><label>Labels</label><div class="dval">'+esc(a.labels.join(', '))+'</div></div>'
        +'<div class="dfield"><label>Latitude</label><div class="dval">'+(a.latitude||'N/A')+'</div></div>'
        +'<div class="dfield"><label>Longitude</label><div class="dval">'+(a.longitude||'N/A')+'</div></div>'
        +'</div></div>';
      h+='<div class="dsec"><h3>Contexte</h3><div class="ctx">'+esc(a.context)+'</div></div>';
      h+='<div class="dsec"><h3>Recherche assistee</h3>'
        +'<div style="font-size:.82rem;color:var(--text-2);margin-bottom:12px">Recherche le pays correspondant a ce lieu.</div>'
        +'<div class="srow"><input id="autoQ" type="text" value="'+esc(a.form)+'" placeholder="Lieu..." /><select id="autoSrc"><option value="nominatim">Nominatim</option><option value="wikidata">Wikidata</option></select><button class="btn btn-a" onclick="runSearch()">Rechercher</button></div>'
        +'<div id="autoRes"><div style="color:var(--text-2);font-size:.88rem">Lance une recherche pour trouver le pays.</div></div></div>';
      h+='<div class="dsec"><h3>Saisie manuelle</h3>'
        +'<div class="mgrid"><div class="mfield"><label>Nom du pays</label><input id="mCName" type="text" placeholder="ex: France" /></div>'
        +'<div class="mfield"><label>URI Wikidata</label><input id="mCUri" type="text" placeholder="https://www.wikidata.org/entity/Q..." /></div></div>'
        +'<div class="mgrid"><div class="mfield"><label>Latitude</label><input id="mCLat" type="number" step="any" /></div>'
        +'<div class="mfield"><label>Longitude</label><input id="mCLon" type="number" step="any" /></div></div>'
        +'<div class="mgrid full"><div class="mfield"><label>Description</label><input id="mCDesc" type="text" placeholder="ex: pays d\'Europe" /></div></div>'
        +'<button class="btn btn-ok" onclick="applyManualEnrich()">Ajouter ce Country</button></div>';
      v.innerHTML=h;
    }

    // ═══════════ SEARCH ═══════════
    async function searchNominatim(q){
      var r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=6&addressdetails=1&accept-language=fr');
      if(!r.ok)throw new Error('HTTP '+r.status);var d=await r.json();
      return d.map(function(i){return{name:i.display_name,latitude:parseFloat(i.lat),longitude:parseFloat(i.lon),type:i.type||'',source:'nominatim',country:i.address&&i.address.country||null,countryCode:i.address&&i.address.country_code||null}});
    }

    async function searchWikidata(q){
      var r=await fetch('https://www.wikidata.org/w/api.php?action=wbsearchentities&search='+encodeURIComponent(q)+'&language=fr&limit=6&format=json&origin=*');
      if(!r.ok)throw new Error('HTTP '+r.status);var d=await r.json();var res=[];
      for(var item of(d.search||[])){
        try{
          var er=await fetch('https://www.wikidata.org/w/api.php?action=wbgetentities&ids='+item.id+'&props=claims|descriptions&format=json&origin=*');
          var ed=await er.json(),ent=ed.entities&&ed.entities[item.id];if(!ent)continue;
          var lat=null,lon=null,cc=ent.claims&&ent.claims['P625'];
          if(cc&&cc[0]&&cc[0].mainsnak&&cc[0].mainsnak.datavalue&&cc[0].mainsnak.datavalue.value){lat=cc[0].mainsnak.datavalue.value.latitude;lon=cc[0].mainsnak.datavalue.value.longitude}
          var countryId=null,p17=ent.claims&&ent.claims['P17'];
          if(p17&&p17[0]&&p17[0].mainsnak&&p17[0].mainsnak.datavalue)countryId='Q'+p17[0].mainsnak.datavalue.value['numeric-id'];
          var desc=(ent.descriptions&&ent.descriptions.fr&&ent.descriptions.fr.value)||item.description||'';
          res.push({name:item.label+(desc?' \u2014 '+desc:''),latitude:lat,longitude:lon,uri:'https://www.wikidata.org/entity/'+item.id,description:desc,type:'wikidata',source:'wikidata',entityId:item.id,countryEntityId:countryId});
        }catch(e){}
      }
      return res;
    }

    async function fetchWikidataCountry(entityId){
      try{
        var r=await fetch('https://www.wikidata.org/w/api.php?action=wbgetentities&ids='+entityId+'&props=claims|labels|descriptions|aliases&languages=fr&format=json&origin=*');
        var d=await r.json(),ent=d.entities&&d.entities[entityId];if(!ent)return null;
        var label=(ent.labels&&ent.labels.fr&&ent.labels.fr.value)||entityId;
        var desc=(ent.descriptions&&ent.descriptions.fr&&ent.descriptions.fr.value)||'';
        var aliases=(ent.aliases&&ent.aliases.fr)?ent.aliases.fr.map(function(a){return a.value}):[];
        var lat=null,lon=null,cc=ent.claims&&ent.claims['P625'];
        if(cc&&cc[0]&&cc[0].mainsnak&&cc[0].mainsnak.datavalue&&cc[0].mainsnak.datavalue.value){lat=cc[0].mainsnak.datavalue.value.latitude;lon=cc[0].mainsnak.datavalue.value.longitude}
        var img=null,p18=ent.claims&&ent.claims['P18'];
        if(p18&&p18[0]&&p18[0].mainsnak&&p18[0].mainsnak.datavalue){var fn=p18[0].mainsnak.datavalue.value;img='http://commons.wikimedia.org/wiki/Special:FilePath/'+encodeURIComponent(fn)}
        return {_id:'https://www.wikidata.org/entity/'+entityId,form:label,labels:['Thing/Abstract/Location/Country'],properties:{value:label,latitude:lat||0,longitude:lon||0,description:desc,imageUrl:img,aliases:aliases,type:'Thing/Abstract/Location/Country',info:null,uri:'https://www.wikidata.org/entity/'+entityId}};
      }catch(e){return null}
    }

    async function runSearch(){
      var q=$('autoQ').value.trim(),src=$('autoSrc').value,c=$('autoRes');
      if(!q){c.innerHTML='<div style="color:var(--warn)">Saisis un terme.</div>';return}
      c.innerHTML='<div style="display:flex;align-items:center;gap:8px"><span class="spinner"></span> Recherche...</div>';
      try{
        var results=src==='wikidata'?await searchWikidata(q):await searchNominatim(q);
        _autoResults=results;
        if(!results.length){c.innerHTML='<div style="color:var(--warn)">Aucun r\u00e9sultat.</div>';return}
        var h='<div class="slist">';
        for(var i=0;i<results.length;i++){
          var r=results[i];
          var coords=(r.latitude!=null&&r.longitude!=null)?r.latitude.toFixed(4)+', '+r.longitude.toFixed(4):'<span style="color:var(--warn)">?</span>';
          var extra=(r.country?' \u00b7 Pays: '+esc(r.country):'');
          h+='<div class="sitem" data-ri="'+i+'" onclick="applyAutoResult(Number(this.dataset.ri))"><div><div class="sn">'+esc(r.name)+'</div><div class="sd">'+esc(r.type)+extra+'</div></div><div class="sc">'+coords+'</div></div>';
        }
        h+='</div>';c.innerHTML=h;
      }catch(err){c.innerHTML='<div style="color:var(--danger)">Erreur: '+esc(err.message)+'</div>'}
    }

    async function applyAutoResult(idx){
      var r=_autoResults[idx];
      var a=enrichItems[activeIdx];
      $('autoRes').innerHTML='<div style="display:flex;align-items:center;gap:8px"><span class="spinner"></span> R\u00e9cup\u00e9ration du pays...</div>';

      var countryNode=null;
      if(r.source==='nominatim'&&r.country){
        var cResults=await searchWikidata(r.country);
        for(var cr of cResults){
          if(cr.countryEntityId||cr.entityId){
            countryNode=await fetchWikidataCountry(cr.entityId);
            if(countryNode)break;
          }
        }
        if(!countryNode){
          $('autoRes').innerHTML='<div style="color:var(--warn)">Pays "'+esc(r.country)+'" non trouv\u00e9 sur Wikidata. Essaie Wikidata directement ou saisis manuellement.</div>';
          return;
        }
      }
      if(r.source==='wikidata'&&r.countryEntityId){
        countryNode=await fetchWikidataCountry(r.countryEntityId);
      }
      if(!countryNode){
        $('autoRes').innerHTML='<div style="color:var(--warn)">Pays non trouv\u00e9 pour ce r\u00e9sultat. Essaie un autre ou saisis manuellement.</div>';
        return;
      }
      enrichData.set(a.nodeKey,{countryNode:countryNode,placeNodeId:a.nodeId});
      renderEnrichDetail(a);renderList();updateStats();
    }

    function applyManualEnrich(){
      var a=enrichItems[activeIdx];
      var name=$('mCName').value.trim(),uri=$('mCUri').value.trim();
      var lat=parseFloat($('mCLat').value),lon=parseFloat($('mCLon').value),desc=$('mCDesc').value.trim();
      if(!name||!uri)return alert('Nom et URI requis.');
      if(isNaN(lat))lat=0;if(isNaN(lon))lon=0;
      var cn={_id:uri,form:name,labels:['Thing/Abstract/Location/Country'],properties:{value:name,latitude:lat,longitude:lon,description:desc||null,imageUrl:null,aliases:[],type:'Thing/Abstract/Location/Country',info:null,uri:uri}};
      enrichData.set(a.nodeKey,{countryNode:cn,placeNodeId:a.nodeId});
      renderEnrichDetail(a);renderList();updateStats();
    }

    // ═══════════ EXPORT ═══════════
    function doExport(){
      var data=JSON.parse(JSON.stringify(rawJson));
      var edgeCtr=800000;
      for(var ev of data){
        var nodesToCheck=ev.nodes||[];
        for(var n of nodesToCheck){
          var nk=String(n._id||'')+'||'+(n.form||'');
          if(!enrichData.has(nk))continue;
          var ed=enrichData.get(nk);
          var cn=ed.countryNode;
          var hasCountry=(ev.nodes||[]).some(function(x){return String(x._id)===cn._id});
          if(!hasCountry)ev.nodes.push(JSON.parse(JSON.stringify(cn)));
          var hasEdge=(ev.edges||[]).some(function(e){return String(e.source)===ed.placeNodeId&&String(e.target)===cn._id});
          if(!hasEdge){
            if(!ev.edges)ev.edges=[];
            ev.edges.push({_id:String(edgeCtr++),type:'Country',source:ed.placeNodeId,target:cn._id,properties:{}});
          }
        }
      }
      var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='export.events.enriched.json';a.click();URL.revokeObjectURL(url);
      alert('Export OK !\n\n\u2022 '+enrichData.size+' Country ajout\u00e9s\n\nFichier: export.events.enriched.json');
    }

    // ═══════════ LOAD ═══════════
    function loadFromText(text, options){
      options=options||{};
      rawJson=parse(text);
      enrichItems=detectEnrichItems(rawJson);enrichData.clear();
      activeIdx=-1;
      $('loadOverlay').classList.add('hidden');
      $('bottomInfo').textContent=rawJson.length+' evenements charges - '+enrichItems.length+' places sans country';
      renderList();updateStats();
      $('emptyState').style.display='';$('detailView').style.display='none';
      if(!options.skipShare&&window.PrevyoSharedDataset){window.PrevyoSharedDataset.saveText(text,options.sourceLabel||'Ajout Country')}
    }

    initializeLayoutCopy();

    $('loadFileBtn').addEventListener('click',function(){$('fileInput').click()});
    $('fileInput').addEventListener('change',async function(e){var f=e.target.files[0];if(!f)return;try{loadFromText(await f.text(),{sourceLabel:f.name})}catch(err){alert(err.message)}});
    $('loadAutoBtn').addEventListener('click',async function(){try{var r=await fetch('data/export.events.json',{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);loadFromText(await r.text(),{sourceLabel:'data/export.events.json'})}catch(err){alert(err.message)}});
    $('reloadBtn').addEventListener('click',function(){$('loadOverlay').classList.remove('hidden')});
    $('exportBtn').addEventListener('click',doExport);
    $('filterInput').addEventListener('input',function(){renderList()});
    if(window.PrevyoSharedDataset){
      var shared=window.PrevyoSharedDataset.read();
      if(shared&&shared.text){try{loadFromText(shared.text,{skipShare:true,sourceLabel:shared.sourceLabel})}catch(err){console.warn('Shared dataset ignored:',err)}}
      window.PrevyoSharedDataset.subscribe(function(payload){
        if(!payload||!payload.text)return;
        try{loadFromText(payload.text,{skipShare:true,sourceLabel:payload.sourceLabel})}catch(err){console.warn('Shared dataset refresh failed:',err)}
      });
    }
</script>
</body>
